model:
  provider: local
  name: Qwen/Qwen2.5-0.5B-Instruct
  adapter_path: outputs/finetune/qwen2.5-0.5B/adapter
  temperature: 0.7
  max_tokens: 1024
  max_retries: 1

concurrency: 1
batch_size: 128

prompt:
  mode: zero_shot
  n_examples: 0
  example_selection: stratified

attributes:
  fields:
    - age
    - sex
    - vehicles
    - employment
    - hh_income
    - hh_zone
    - day
    - access_egress_distance

validation:
  strict: true
  log_violations: true
