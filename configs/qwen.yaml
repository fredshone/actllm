model:
  provider: local
  name: Qwen/Qwen2.5-0.5B-Instruct
  temperature: 0.8
  max_tokens: 1024
  max_retries: 2

concurrency: 1  # local GPU inference is sequential
batch_size: 100

prompt:
  mode: few_shot
  n_examples: 3
  example_selection: nearest_neighbour
  few_shot_pool: data/few_shot/pool.jsonl

attributes:
  fields:
    - age
    - sex
    - vehicles
    - employment
    - hh_income
    - hh_zone
    - day
    - access_egress_distance

validation:
  strict: true
  log_violations: true
