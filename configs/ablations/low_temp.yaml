model:
  provider: local
  name: google/gemma-4-E2B-it
  temperature: 0.3
  max_tokens: 1024
  max_retries: 3

concurrency: 1
batch_size: 25

prompt:
  mode: zero_shot
  n_examples: 0
  example_selection: stratified

attributes:
  fields:
    - age
    - sex
    - vehicles
    - employment
    - hh_income
    - hh_zone
    - day
    - access_egress_distance

validation:
  strict: true
  log_violations: true
