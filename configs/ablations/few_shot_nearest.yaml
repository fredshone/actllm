model:
  provider: local
  name: google/gemma-4-E2B-it
  temperature: 0.8
  max_tokens: 1024
  max_retries: 5

concurrency: 1
batch_size: 25

prompt:
  mode: few_shot
  n_examples: 3
  example_selection: nearest_neighbour
  few_shot_pool: data/few_shot/pool.jsonl

attributes:
  fields:
    - age
    - sex
    - vehicles
    - employment
    - hh_income
    - hh_zone
    - day
    - access_egress_distance

validation:
  strict: true
  log_violations: true
